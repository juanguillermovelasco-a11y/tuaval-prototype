<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta | Tu Aval</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: -apple-system, Inter, system-ui, sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .loader { width: 36px; height: 36px; border: 3px solid #f3f4f6; border-top-color: #0A2540; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .fade-in { animation: fadeIn 0.5s ease-out both; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#FAFAFA] text-[#0A2540]">
  <div class="text-center fade-in">
    <div class="loader mx-auto mb-6"></div>
    <p class="text-xs uppercase tracking-[0.2em] text-gray-400 mb-2">Abriendo onboarding</p>
    <p class="text-lg font-semibold tracking-tight">Preparando tu asistente...</p>
  </div>
  <script>
    localStorage.setItem('tu_aval_user', JSON.stringify({
      id: 'demo', name: 'Inversionista', role: 'investor'
    }));
    setTimeout(() => { window.location.replace('../portal/inversionista/onboarding/chat.html'); }, 900);
  </script>
</body>
</html>
