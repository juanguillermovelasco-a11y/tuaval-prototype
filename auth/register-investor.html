<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro inversionista | Tu Aval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'blue-night': '#0A2540',
              'mint': '#3BE2B0',
                  'mint-text': '#0D9B6A',
              'blue-medium': '#4A90E2',
              'gray-text': '#425466',
              'success': '#24B47E'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            heading: ['Poppins', 'system-ui', 'sans-serif']
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap');
      body { font-family: Inter, system-ui, sans-serif; }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-text">
    <nav class="bg-white shadow-sm border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <a href="../index.html" class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-gradient-to-br from-mint to-blue-medium rounded-lg flex items-center justify-center">
              <i class="fas fa-shield-alt text-white text-xl"></i>
            </div>
            <span class="text-2xl font-heading font-bold text-blue-night">Tu Aval</span>
          </a>
          <a href="login.html" class="hidden md:inline text-gray-text hover:text-blue-medium transition">Iniciar sesión</a>
          <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden text-blue-night text-2xl">
            <i class="fas fa-bars"></i>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden border-t border-gray-200 px-4 py-4 space-y-3">
        <a href="../como-funciona.html" class="block text-gray-text hover:text-blue-medium transition py-2">Cómo funciona</a>
        <a href="../estudiante.html" class="block text-gray-text hover:text-blue-medium transition py-2">Estudiantes</a>
        <a href="../propietario.html" class="block text-gray-text hover:text-blue-medium transition py-2">Propietarios</a>
        <a href="../inversionista.html" class="block text-gray-text hover:text-blue-medium transition py-2">Inversionistas</a>
        <a href="../precios.html" class="block text-gray-text hover:text-blue-medium transition py-2">Precios</a>
        <div class="pt-3 border-t border-gray-200 flex gap-3">
          <a href="../auth/login.html" class="text-gray-text hover:text-blue-medium transition py-2">Iniciar sesión</a>
          <a href="../auth/register.html" class="bg-mint text-blue-night px-5 py-2 rounded-xl font-medium">Comenzar</a>
        </div>
      </div>
    </nav>

    <main class="max-w-2xl mx-auto py-16 px-4">
      <div class="text-center mb-8">
        <div class="inline-block bg-gradient-to-br from-mint to-blue-medium p-4 rounded-2xl mb-4">
          <i class="fas fa-chart-line text-white text-4xl"></i>
        </div>
        <h2 class="text-3xl font-heading font-bold text-blue-night">Únete como inversionista</h2>
        <p class="text-gray-600 mt-2">Aporta capital al fondo y obtén un 8% anual fijo con liquidez trimestral.</p>
      </div>

      <div class="bg-white rounded-2xl shadow-lg p-8">
        <form id="investorForm" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Nombre completo *</label>
            <input type="text" name="name" required
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-mint focus:outline-none"
              placeholder="Ej: María Restrepo" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Correo electrónico *</label>
            <input type="email" name="email" required
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-mint focus:outline-none"
              placeholder="maria@email.com" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña *</label>
            <input type="password" name="password" required minlength="8"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-mint focus:outline-none"
              placeholder="••••••••" />
          </div>
          <label class="flex items-start gap-3 text-sm text-gray-700">
            <input type="checkbox" required class="mt-1 w-5 h-5 text-mint-text" />
            Acepto los términos y condiciones de Tu Aval Capital
          </label>
          <button type="submit"
            class="w-full bg-mint text-white py-3 rounded-xl font-semibold hover:bg-opacity-90 transition text-lg">
            Continuar al chat del asistente
          </button>
        </form>
      </div>
    </main>

    <script>
      document.getElementById('investorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = e.target.name.value || 'Inversionista Demo';
        localStorage.setItem('tu_aval_user', JSON.stringify({ id: 'demo', name, role: 'investor' }));
        window.location.href = '../portal/inversionista/onboarding/chat.html';
      });
    </script>
  </body>
</html>
