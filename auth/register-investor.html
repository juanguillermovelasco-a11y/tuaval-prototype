<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro inversionista | Tu Aval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'blue-night': '#0A2540',
              'mint': '#3BE2B0',
                  'mint-text': '#0D9B6A',
              'blue-medium': '#4A90E2',
              'gray-text': '#425466',
              'success': '#24B47E'
            }
          },
          fontFamily: {
                sans: ['-apple-system', 'Inter', 'system-ui', 'sans-serif']
              }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      body { font-family: Inter, system-ui, sans-serif; }
      [data-reveal] { opacity: 0; transform: translateY(20px); transition: opacity 0.7s ease-out, transform 0.7s ease-out; }
          [data-reveal].revealed { opacity: 1; transform: translateY(0); }
        </style>
  </head>
  <body class="bg-white text-gray-500 leading-relaxed">
    <nav class="bg-white/80 backdrop-blur-lg border-b border-gray-100 sticky top-0 z-50">
      <div class="max-w-5xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
          <a href="../index.html" class="flex items-center gap-2.5">
            <svg class="w-8 h-8" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="32" height="32" rx="8" fill="#0A2540"/><text x="16" y="23" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="19" font-weight="600" text-anchor="middle" fill="white" letter-spacing="-0.8">a</text><circle cx="24.5" cy="8" r="2.5" fill="#3BE2B0"/></svg>
            <span class="text-xl font-semibold text-blue-night tracking-tight">Tu Aval</span>
          </a>
          <a href="login.html" class="hidden md:inline text-gray-text hover:text-blue-medium transition">Iniciar sesión</a>
          <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden text-blue-night text-xl">
            <i class="fas fa-bars"></i>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 px-6 py-4 space-y-3 bg-white">
        <a href="../como-funciona.html" class="block text-gray-500 hover:text-blue-night transition py-2 text-sm">Cómo funciona</a>
        <a href="../estudiante.html" class="block text-gray-500 hover:text-blue-night transition py-2 text-sm">Estudiantes</a>
        <a href="../propietario.html" class="block text-gray-500 hover:text-blue-night transition py-2 text-sm">Propietarios</a>
        <a href="../inversionista.html" class="block text-gray-500 hover:text-blue-night transition py-2 text-sm">Inversionistas</a>
        <a href="../precios.html" class="block text-gray-500 hover:text-blue-night transition py-2 text-sm">Precios</a>
        <div class="pt-3 border-t border-gray-100 flex gap-4 items-center">
          <a href="../auth/login.html" class="text-gray-text hover:text-blue-medium transition py-2">Iniciar sesión</a>
          <a href="../auth/register.html" class="bg-blue-night text-white px-5 py-2 rounded-full text-sm font-medium">Comenzar</a>
        </div>
      </div>
    </nav>

    <main class="max-w-2xl mx-auto py-16 px-4">
      <div class="text-center mb-8">
        <div class="inline-block bg-gradient-to-br from-mint to-blue-medium p-4 rounded-2xl mb-4">
          <i class="fas fa-chart-line text-white text-4xl"></i>
        </div>
        <h2 class="text-4xl md:text-5xl font-semibold tracking-[-0.03em] text-blue-night">Únete como inversionista</h2>
        <p class="text-gray-600 mt-2">Aporta capital al fondo y obtén un 8% anual fijo con liquidez trimestral.</p>
      </div>

      <div class="bg-white border border-gray-100 rounded-2xl p-8">
        <form id="investorForm" class="space-y-6">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-2 uppercase tracking-wider">Nombre completo *</label>
            <input type="text" name="name" required
              class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:border-blue-night focus:outline-none transition"
              placeholder="Ej: María Restrepo" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-2 uppercase tracking-wider">Correo electrónico *</label>
            <input type="email" name="email" required
              class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:border-blue-night focus:outline-none transition"
              placeholder="maria@email.com" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-2 uppercase tracking-wider">Contraseña *</label>
            <input type="password" name="password" required minlength="8"
              class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:border-blue-night focus:outline-none transition"
              placeholder="••••••••" />
          </div>
          <label class="flex items-start gap-3 text-sm text-gray-700">
            <input type="checkbox" required class="mt-1 w-5 h-5 text-mint-text" />
            Acepto los términos y condiciones de Tu Aval
          </label>
          <button type="submit"
            class="w-full bg-blue-night text-white py-3 rounded-full font-semibold hover:bg-blue-night/90 transition text-lg">
            Continuar al chat del asistente
          </button>
        </form>
      </div>
    </main>

    <script>
      document.getElementById('investorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = e.target.name.value || 'Inversionista Demo';
        localStorage.setItem('tu_aval_user', JSON.stringify({ id: 'demo', name, role: 'investor' }));
        window.location.href = '../portal/inversionista/onboarding/chat.html';
      });
    </script>
  <script>
requestAnimationFrame(() => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('revealed');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.05, rootMargin: '50px' });
  document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
});
</script>
</body>
</html>
