<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding inversionista | Tu Aval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'blue-night': '#0A2540',
              'mint': '#3BE2B0',
                  'mint-text': '#0D9B6A',
              'blue-medium': '#4A90E2',
              'gray-text': '#425466',
              'success': '#24B47E'
            }
          },
          fontFamily: {
                sans: ['-apple-system', 'Inter', 'system-ui', 'sans-serif']
              }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      body { font-family: Inter, system-ui, sans-serif; }
      [data-reveal] { opacity: 0; transform: translateY(20px); transition: opacity 0.7s ease-out, transform 0.7s ease-out; }
          [data-reveal].revealed { opacity: 1; transform: translateY(0); }
        </style>
  </head>
  <body class="bg-white text-gray-500 leading-relaxed">
    <nav class="bg-white/80 backdrop-blur-lg border-b border-gray-100 sticky top-0 z-50">
      <div class="max-w-5xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
          <a href="../../../index.html" class="flex items-center gap-2.5">
            <svg class="w-8 h-8" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="32" height="32" rx="8" fill="#0A2540"/><text x="16" y="23" font-family="-apple-system, Inter, system-ui, sans-serif" font-size="19" font-weight="600" text-anchor="middle" fill="white" letter-spacing="-0.8">a</text><circle cx="24.5" cy="8" r="2.5" fill="#3BE2B0"/></svg>
            <span class="text-xl font-semibold text-blue-night tracking-tight">Tu Aval</span>
          </a>
          <div class="hidden md:flex items-center space-x-8">
            <a href="../index.html" class="text-sm text-gray-400 hover:text-blue-night transition">Dashboard</a>
            <a href="../onboarding/chat.html" class="text-sm text-blue-night font-semibold transition">Perfil inversor</a>
          </div>

          <a href="../index.html" class="hidden md:inline text-sm text-gray-400 hover:text-blue-night transition">
            Salir <span class="ml-1">×</span>
          </a>
          <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden text-blue-night text-xl">
            <i class="fas fa-bars"></i>
          </button>
        </div>
      </div>
      <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 px-6 py-4 space-y-3 bg-white">
        <a href="../index.html" class="block text-gray-500 hover:text-blue-night transition py-2 text-sm">Dashboard</a>
        <a href="../onboarding/chat.html" class="block text-blue-night font-semibold transition py-2 text-sm">Perfil inversor</a>
      </div>
    </nav>

    <main>
      <div id="chat-root"></div>
    </main>

    <script src="../../../static/chat-engine.js?v=20260419-ai"></script>
    <script>
      TuAvalChat.init({
        mountSelector: '#chat-root',
        role: 'investor',
        storageKey: 'tu_aval_onboarding_inversionista',
        onComplete: (data) => {
          localStorage.setItem('investorOnboardingComplete', 'true');
          if (data) {
            const investorData = {
              name: data.name,
              capital: data.capital || 10000,
              retorno: data.capital ? Math.round(data.capital * 0.094) : 940,
              contratos: 12
            };
            localStorage.setItem('investorData', JSON.stringify(investorData));
            try {
              const u = JSON.parse(localStorage.getItem('tu_aval_user') || '{}');
              if (data.name) u.name = data.name;
              localStorage.setItem('tu_aval_user', JSON.stringify(u));
            } catch (e) {}
          }
          setTimeout(() => { window.location.href = '../index.html'; }, 2000);
        }
      });
    </script>
  <script>
requestAnimationFrame(() => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('revealed');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.05, rootMargin: '50px' });
  document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
});
</script>
</body>
</html>
