<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Próximamente | Tu Aval</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
<script>tailwind.config={theme:{extend:{colors:{'blue-night':'#0A2540','mint':'#3BE2B0','blue-medium':'#4A90E2'}}}}</script>
</head><body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-lg p-12 max-w-md text-center">
  <div class="inline-block bg-mint p-4 rounded-2xl mb-4"><i class="fas fa-tools text-white text-4xl"></i></div>
  <h1 class="text-3xl font-bold text-blue-night mb-3" style="font-family:Poppins,sans-serif">Próximamente</h1>
  <p class="text-gray-600 mb-6">Esta sección del prototipo estático aún no tiene contenido. Todas las demás páginas son completamente navegables.</p>
  <a href="index.html" class="inline-block bg-mint text-white px-6 py-3 rounded-xl hover:bg-opacity-90 transition font-medium">Volver al inicio</a>
</div>
<script>
(function() {
  function getUser() {
    try { return JSON.parse(localStorage.getItem('tu_aval_user') || 'null'); }
    catch (e) { return null; }
  }
  function relPrefix() {
    // Count how deep the current page is so we can build a relative path back
    // to the site root. e.g. /portal/estudiante/index.html -> "../../"
    var p = window.location.pathname;
    var i = p.indexOf('/tuaval-static/');
    var rel;
    if (i >= 0) rel = p.substring(i + '/tuaval-static/'.length);
    else rel = p.replace(/^\/+/, '');
    var depth = (rel.match(/\//g) || []).length;
    return '../'.repeat(depth);
  }
  function rewriteNav() {
    var u = getUser();
    if (!u) return;
    var prefix = relPrefix();
    // Find login/register links in the top nav (skip ones inside the shim itself)
    var loginLinks = Array.from(document.querySelectorAll('a')).filter(function(a) {
      var h = a.getAttribute('href') || '';
      return /auth\/login\.html$/.test(h) || /^auth\/login\.html/.test(h) ||
             /\.\.\/auth\/login\.html/.test(h) || /\.\.\/\.\.\/auth\/login\.html/.test(h);
    });
    var registerLinks = Array.from(document.querySelectorAll('a')).filter(function(a) {
      var h = a.getAttribute('href') || '';
      // Match the "Comenzar" CTA — has bg-mint class and points to register
      return (/auth\/register\.html/.test(h)) && /bg-mint/.test(a.className || '');
    });
    if (loginLinks.length === 0 && registerLinks.length === 0) return;

    var portalUrl = u.role === 'landlord'
      ? prefix + 'portal/propietario/index.html'
      : prefix + 'portal/estudiante/index.html';
    var homeUrl = prefix + 'index.html';

    // Build the new user pill
    var pill = document.createElement('a');
    pill.href = portalUrl;
    pill.className = 'flex items-center gap-2 text-gray-text hover:text-blue-medium transition';
    pill.innerHTML = '<i class="fas fa-user-circle text-xl"></i><span class="font-medium">' +
                     escapeHtml(u.name || 'Usuario') + '</span>';

    var logout = document.createElement('a');
    logout.href = 'javascript:void(0)';
    logout.className = 'text-sm text-gray-text hover:text-danger transition';
    logout.textContent = 'Salir';
    logout.onclick = function(){
      localStorage.removeItem('tu_aval_user');
      localStorage.removeItem('tu_aval_session');
      localStorage.removeItem('onboardingProgress');
      window.location.href = homeUrl;
    };

    // Replace the first login link's parent block with [pill, logout]
    if (loginLinks.length > 0) {
      var loginEl = loginLinks[0];
      var parent = loginEl.parentNode;
      // Remove all login + register links inside this parent
      Array.from(parent.querySelectorAll('a')).forEach(function(a){
        var h = a.getAttribute('href') || '';
        if (/auth\/(login|register)/.test(h)) a.remove();
      });
      parent.appendChild(pill);
      parent.appendChild(logout);
    }
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // Run after DOM is ready (body already exists since we're at end of body)
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', rewriteNav);
  } else {
    rewriteNav();
  }

  // Also expose a global "reset demo" helper
  window.resetTuAvalDemo = function() {
    localStorage.clear();
    window.location.href = relPrefix() + 'index.html';
  };
})();
</script>
</body></html>
